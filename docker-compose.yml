version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agentarena
      POSTGRES_USER:     agentarena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentarena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://agentarena:${DB_PASSWORD:-secret}@db:5432/agentarena
      REDIS_URL:         redis://redis:6379
      SECRET_KEY:        ${SECRET_KEY:-change-me-in-prod}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENV_PATH:          /app/environment
      PYTHONPATH:        /app/backend:/app/environment
    ports:
      - "8000:8000"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://agentarena:${DB_PASSWORD:-secret}@db:5432/agentarena
      ENV_PATH:     /app/environment
      PYTHONPATH:   /app/backend:/app/environment
    depends_on:
      db: { condition: service_healthy }
    command: python /app/backend/seed_tasks.py
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
